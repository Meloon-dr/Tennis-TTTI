<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TTTI 网球人格测评 V3.0</title>
    <style>
        :root { --primary: #27ae60; --accent: #e67e22; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; margin: 0; min-height: 100vh; align-items: center; }
        #app { width: 100%; max-width: 600px; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); box-sizing: border-box; }
        .progress-container { width: 100%; height: 8px; background: #eee; border-radius: 4px; margin-bottom: 20px; }
        #progress-bar { height: 100%; width: 0%; background: var(--primary); border-radius: 4px; transition: 0.3s; }
        .options { display: grid; gap: 12px; margin-top: 25px; }
        .option-btn { padding: 16px; border: 1px solid #ddd; border-radius: 12px; background: white; cursor: pointer; text-align: left; font-size: 1rem; transition: 0.2s; }
        .option-btn:hover { border-color: var(--primary); background: #f9fffb; transform: translateX(5px); }
        #result-container { display: none; text-align: center; }
        .poster { padding: 40px 20px; border-radius: 15px; color: white; margin-bottom: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        #mascot-img { width: 160px; height: auto; margin-bottom: 15px; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.2)); animation: float 3s infinite ease-in-out; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
        h2 { font-size: 1.25rem; color: #2c3e50; line-height: 1.5; margin: 10px 0; }
        #res-analysis { text-align: left; background: #f8f9fa; padding: 20px; border-radius: 10px; font-size: 0.9rem; line-height: 1.8; color: #444; }
    </style>
</head>
<body>

<div id="app">
    <div id="quiz-container">
        <div class="progress-container"><div id="progress-bar"></div></div>
        <p id="meta" style="color: #888; font-size: 0.85rem; font-weight: bold; margin: 0;"></p>
        <h2 id="q-text">测评初始化中...</h2>
        <div class="options" id="options"></div>
    </div>

    <div id="result-container">
        <div class="poster" id="poster">
            <img id="mascot-img" src="" alt="我的网球吉祥物">
            <h1 id="res-style" style="margin: 10px 0;"></h1>
            <p id="res-desc" style="opacity: 0.9; font-style: italic;"></p>
        </div>
        <div id="res-analysis"></div>
        <button onclick="location.reload()" style="margin-top:25px; padding:12px 30px; background:var(--accent); color:white; border:none; border-radius:25px; cursor:pointer; font-weight:bold;">重新测评</button>
    </div>
</div>

<script>
    // 50道题目数据
    const questions = [
        { q: "在高压分（如 Deuce）时，你的主动进攻欲望：", d: "E" },
        { q: "面对大比分落后，你的心理韧性表现：", d: "E" },
        { q: "击球时，你脑海中对“完美动作”的纠结度：", d: "E" },
        { q: "你对球场感官信息（如球线摩擦声）的捕捉：", d: "E" },
        { q: "赛前制定具体战术计划并执行的频率：", d: "E" },
        { q: "比赛现场被干扰时的专注力保护能力：", d: "E" },
        { q: "赢球带来的竞技满足感占比：", d: "E" },
        { q: "局间休息时，进行积极自我对话的频率：", d: "E" },
        { q: "面对运气球丢分时，情绪恢复的速度：", d: "E" },
        { q: "对网球比赛中“直觉预判”的依赖度：", d: "E" },
        { q: "正手击球力量从脚掌蹬地传导的流畅度：", d: "B" },
        { q: "击球随挥动作完整结束在对侧肩膀的频率：", d: "B" },
        { q: "底线拉锯中，垫步（Split Step）的使用频率：", d: "B" },
        { q: "发球时“挠背”蓄力动作的充分程度：", d: "B" },
        { q: "击球后重心恢复并回到场内中央的速度：", d: "B" },
        { q: "反手击球时，肩膀转动幅度的彻底性：", d: "B" },
        { q: "击球瞬间双眼紧盯球线接触点的稳定性：", d: "B" },
        { q: "截击时非持拍手协助平衡的作用力：", d: "B" },
        { q: "高压球时，利用碎步落位并侧转身体的频率：", d: "B" },
        { q: "开放式站位中蹬地瞬间的爆发力反馈：", d: "B" },
        { q: "发球抛球在空间中落点的稳定性：", d: "B" },
        { q: "击球前那一刻，握拍肌肉的放松程度：", d: "B" },
        { q: "核心在相持中维持身体不摇晃的支撑感：", d: "B" },
        { q: "二发时通过膝盖蹬伸产生上旋的能力：", d: "B" },
        { q: "被动救球时利用切削改变节奏的成功率：", d: "B" },
        { q: "一发成功率的平均表现：", d: "P" },
        { q: "二发被对手直接侧身抢攻的频率：", d: "P" },
        { q: "面对中场浅球时的直接终结成功率：", d: "P" },
        { q: "双打中在网前积极封堵干扰的频率：", d: "P" },
        { q: "连续底线相持不主动失误的极限拍数：", d: "P" },
        { q: "尝试变线攻击时能稳在界内的稳定性：", d: "P" },
        { q: "高压球面对普通挑高球的得分把握性：", d: "P" },
        { q: "被放短球后，能够快速启动救球的频率：", d: "P" },
        { q: "面对对手重球压制时，回球深度的表现：", d: "P" },
        { q: "接发球端，主动施压对方二发的侵略性：", d: "P" },
        { q: "每盘比赛中双误次数的控制能力：", d: "P" },
        { q: "面对老登型切削能保持耐心的能力：", d: "P" },
        { q: "二发带有明显旋转以防被扫的威胁性：", d: "P" },
        { q: "大范围救球后，迅速二次启动的能力：", d: "P" },
        { q: "对球拍磅数微弱变化影响手感的敏感度：", d: "P" },
        { q: "分析对手弱点并制定下一局计划的深度：", d: "S" },
        { q: "根据对手打法调整自己节奏的灵活性：", d: "S" },
        { q: "对“百分比网球”战术的坚决执行力：", d: "S" },
        { q: "双打中与搭档通过战术沟通的默契度：", d: "S" },
        { q: "在恶劣环境下调整击球策略的意识：", d: "S" },
        { q: "对场上节奏感（如拍球次数）的控制：", d: "S" },
        { q: "是否具备明确的得分套路：", d: "S" },
        { q: "对对手情绪崩溃瞬间的捕捉利用能力：", d: "S" },
        { q: "在底线具备调动对手左右奔跑的意识：", d: "S" },
        { q: "赛后感知到本场“进阶点”的深度：", d: "S" }
    ];

    let idx = 0;
    let scores = { E: 0, B: 0, P: 0, S: 0 };

    // 核心渲染函数
    function render() {
        if (idx >= questions.length) {
            show(); 
            return;
        }
        const q = questions[idx];
        
        // 更新 UI 文本
        document.getElementById('meta').innerText = `STEP ${idx + 1} / 50`;
        document.getElementById('q-text').innerText = q.q;
        
        const optsArea = document.getElementById('options');
        optsArea.innerHTML = '';
        
        const labels = ["从未/极弱", "偶尔/较弱", "一般/标准", "经常/优秀", "总是/卓越"];
        labels.forEach((text, i) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = `${i + 1}. ${text}`;
            btn.onclick = () => {
                scores[q.d] += (i + 1);
                idx++;
                render();
            };
            optsArea.appendChild(btn);
        });
        
        // 更新进度条
        document.getElementById('progress-bar').style.width = `${(idx / 50) * 100}%`;
    }

    // 结果展示函数
    function show() {
        document.getElementById('quiz-container').style.display = 'none';
        document.getElementById('result-container').style.display = 'block';
        
        let sStyle = "", sDesc = "", sColor = "", sMascot = "";
        
        // 判定算法
        if (scores.E >= 35) {
            sStyle = "底线进攻型 (AB)"; sDesc = "用深度和力量统治赛场的重炮手"; sColor = "linear-gradient(135deg, #e74c3c, #c0392b)"; sMascot = "ab.png";
        } else if (scores.S >= 40) {
            sStyle = "睿智老登型 (LD)"; sDesc = "用落点和心理博弈降维打击的战术大师"; sColor = "linear-gradient(135deg, #f39c12, #d35400)"; sMascot = "ld.png";
        } else if (scores.B >= 55) {
            sStyle = "发球上网型 (S&V)"; sDesc = "在电光火石间终结比赛的网前艺术家"; sColor = "linear-gradient(135deg, #27ae60, #16a085)"; sMascot = "sv.png";
        } else {
            sStyle = "全场变化型 (AC)"; sDesc = "战术库里永远有下一张牌的球场魔术师"; sColor = "linear-gradient(135deg, #8e44ad, #2c3e50)"; sMascot = "ac.png";
        }

        document.getElementById('poster').style.background = sColor;
        document.getElementById('res-style').innerText = sStyle;
        document.getElementById('res-desc').innerText = sDesc;
        document.getElementById('mascot-img').src = sMascot;
        
        document.getElementById('res-analysis').innerHTML = `
            <strong>📊 维度得分报告：</strong><br>
            - 心理驱动 (E): ${scores.E} / 50<br>
            - 动力链 (B): ${scores.B} / 75<br>
            - 实战表现 (P): ${scores.P} /
